name: Tag Release From Merge

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tag-release:
    if: github.repository == 'tiangong-lca/tiangong-cli'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.TIANGONG_CLI_RELEASE_AUTOMATION_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install docpact
        run: cargo install docpact --version 0.1.9 --force

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Validate automation token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "error: missing TIANGONG_CLI_RELEASE_AUTOMATION_TOKEN secret" >&2
            exit 1
          fi

      - name: Run docpact release gate before tag
        env:
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF="${HEAD_REF}^"
          fi
          scripts/docpact-gate.sh --base "$BASE_REF" --head "$HEAD_REF"

      - name: Detect release version changes
        id: release
        env:
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: ${{ github.sha }}
        run: |
          node ./scripts/ci/detect-release-changes.cjs \
            --base-ref "$BASE_REF" \
            --head-ref "$HEAD_REF"

      - name: Stop when no package version changed
        if: steps.release.outputs.any_changed != 'true'
        run: echo "No package version changes detected on main."

      - name: Install dependencies
        if: steps.release.outputs.cli_changed == 'true'
        run: npm ci

      - name: Run release gate before tag
        if: steps.release.outputs.cli_changed == 'true'
        run: npm run prepush:gate

      - name: Check npm registry version availability
        if: steps.release.outputs.cli_changed == 'true'
        env:
          CLI_VERSION: ${{ steps.release.outputs.cli_version }}
        run: |
          node ./scripts/ci/release-version.cjs assert-unpublished \
            --version "$CLI_VERSION"

      - name: Create release tag
        if: steps.release.outputs.cli_changed == 'true'
        env:
          TAG_NAME: ${{ steps.release.outputs.cli_tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "error: tag ${TAG_NAME} already exists" >&2
            exit 1
          fi
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            --method POST \
            -f ref="refs/tags/${TAG_NAME}" \
            -f sha="${TARGET_SHA}"
